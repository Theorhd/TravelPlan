name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add iOS Rust targets
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim
          rustup target add x86_64-apple-ios

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize iOS project for Tauri
        run: npm run tauri ios init -- --ci

      - name: Build unsigned iOS app bundle
        run: npm run tauri ios build -- --no-codesign

      - name: Package unsigned .ipa
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH=$(find src-tauri/gen/apple/build -type d -name "TravelPlan.app" | head -n 1)

          if [ -z "${APP_PATH}" ]; then
            echo "TravelPlan.app not found"
            find src-tauri/gen/apple -maxdepth 5 -type d -name "*.app" || true
            exit 1
          fi

          rm -rf Payload
          mkdir -p Payload
          cp -R "${APP_PATH}" Payload/
          zip -r TravelPlan-unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TravelPlan-unsigned-ipa
          path: TravelPlan-unsigned.ipa
